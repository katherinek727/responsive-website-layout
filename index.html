<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Создание сайтов под ключ с SEO-продвижением. Разработка веб-проектов с гарантией топовых позиций в поиске.">
  <meta name="keywords" content="создание сайтов, SEO-продвижение, разработка сайтов, веб-разработка, интернет-магазин, корпоративный сайт">
  <meta name="author" content="Битроид">
  <title>Битроид — IT company | Создание сайтов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
 <!--  ========== Ellipse ========== -->
  <div class="group group__ellipse8 group48__ellipse8"></div>
  <div class="group group__ellipse9 group48__ellipse9"></div>
  <div class="group group__ellipse8 group49__ellipse8"></div>
  <div class="group group__ellipse9 group49__ellipse9"></div>
  <div class="group group__ellipse8 group56__ellipse8"></div>
  <div class="group group__ellipse9 group56__ellipse9"></div>
  <div class="group group__ellipse8 group52__ellipse8"></div>
  <div class="group group__ellipse9 group52__ellipse9"></div>

  <!-- ========== HEADER ========== -->
  <div id="header-placeholder"></div>
  <!-- ========== /HEADER ========== -->

  <!-- ========== CONTENT ========== -->
  <div id="content-placeholder"></div>
  <!-- ========== /CONTENT ========== -->

  <!-- ========== FOOTER ========== -->
  <div id="footer-placeholder"></div>
  <!-- ========== /FOOTER ========== -->

  <script>
    // Function to load HTML components
    async function loadComponent(url, placeholderId) {
      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`Failed to load ${url}: ${response.status}`);
        }
        const html = await response.text();
        document.getElementById(placeholderId).innerHTML = html;
      } catch (error) {
        console.error(`Error loading component from ${url}:`, error);
      }
    }

    // Load all components when DOM is ready
    document.addEventListener('DOMContentLoaded', async function() {
      // Load components in parallel
      await Promise.all([
        loadComponent('components/header.html', 'header-placeholder'),
        loadComponent('content.html', 'content-placeholder'),
        loadComponent('components/footer.html', 'footer-placeholder')
      ]);

      // After components are loaded, initialize the main.js functionality
      const script = document.createElement('script');
      script.src = 'js/main.js';
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
